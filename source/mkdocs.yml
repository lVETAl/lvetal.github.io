site_name: Simina Elisaveta | My portfolio


nav:
  - Главная: index.md
  - Об авторе: about.md
  - Лабораторные работы:
      - Обзор: labs/index.md
      - Лабораторная работа №1: labs/lab1.md
      - Лабораторная работа №2: labs/lab2.md
      - Лабораторная работа №3: labs/lab3.md
      - Лабораторная работа №4: labs/lab4.md
      - Лабораторная работа №5: labs/lab5.md
      - Лабораторная работа №6: labs/lab6.md
      - Лабораторная работа №7: labs/lab7.md
      - Лабораторная работа №8: labs/lab8.md
  - Контакты: contact.md
theme:
  name: material
  favicon: skins/images/icon.png
  logo: skins/images/logo.png
  palette:
    - scheme: slate
      primary: dark blue
      accent: deep blue
      toggle:
        icon: material/weather-night
        name: light theme
    - scheme: default
      primary: dark blue
      accent: deep blue
      toggle:
        icon: material/weather-sunny
        name: dark theme

  features:
    - navigation.tabs
    - navigation.top
    - navigation.footer
    - content.code.copy
    - content.code.annotate

  hide:
    - navigation

markdown_extensions:
  - pymdownx.highlight:
  - pymdownx.superfences
